name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # Annotated tags are not always fully present until this fetch; versioneer needs them.
      - name: Fetch tags for versioneer
        run: git fetch --tags --force

      - name: Extract data from tag (subject for release builds)
        id: tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          subject=$(git for-each-ref "${GITHUB_REF}" --format='%(contents:subject)')
          {
            echo "subject<<EOF"
            echo "${subject}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
